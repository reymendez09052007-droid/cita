<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres tener una cita conmigo?</title>
    <style>
        /* Configuración del fondo y diseño responsivo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffb6c1; /* Fondo rosa claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .contenedor {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
            position: relative;
        }

        h1 {
            color: #ff1493;
            font-size: 2rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Estilo de los botones */
        .botones {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
        }

        #btn-si {
            background-color: #ff1493;
            color: white;
        }

        #btn-si:hover {
            transform: scale(1.1);
            background-color: #ff69b4;
        }

        /* Botón NO inicia oculto en la intro y en posición relativa */
        #btn-no {
            background-color: #8b8b8b;
            color: white;
            position: relative; 
            display: none; /* Se oculta durante la introducción */
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 id="pregunta">Holaaaaa Aryyyy como estas?</h1>
        <div class="botones" id="contenedor-botones">
            <button id="btn-si" onclick="avanzarIntro()">bien</button>
            <button id="btn-no" onmouseover="moverBoton()" onclick="moverBoton()">No</button>
        </div>
    </div>

    <script>
        // Controla el avance de toda la página
        let faseIntro = 1;
        let fasePreguntas = 1;

        // Función para manejar la nueva introducción paso a paso
        function avanzarIntro() {
            const pregunta = document.getElementById('pregunta');
            const btnSi = document.getElementById('btn-si');
            const btnNo = document.getElementById('btn-no');

            if (faseIntro === 1) {
                pregunta.innerHTML = "Perdon por hoy no hablarte tanto pero es que estaba haciendo esto kfajksdjasjd";
                btnSi.innerHTML = "okeii";
                faseIntro = 2;
            } 
            else if (faseIntro === 2) {
                pregunta.innerHTML = "Bien, eh estado haciendo esto pq tenia ganas de preguntarte algo okei? 😭";
                btnSi.innerHTML = "buenom";
                faseIntro = 3;
            } 
            else if (faseIntro === 3) {
                pregunta.innerHTML = "bueno ahi vamos";
                btnSi.innerHTML = "ok";
                faseIntro = 4;
            } 
            else if (faseIntro === 4) {
                // AQUÍ TERMINA LA INTRO Y EMPIEZA LO ANTERIOR
                pregunta.innerHTML = "¿Quieres tener una cita conmigo?";
                btnSi.innerHTML = "Sí";
                
                // Mostramos el botón "No" que estuvo oculto en la intro
                btnNo.style.display = 'inline-block'; 
                btnSi.setAttribute('onclick', 'presionoSi()');
            }
        }

        // Lógica de las preguntas de la cita (lo que ya tenías)
        function presionoSi() {
            const pregunta = document.getElementById('pregunta');
            const btnSi = document.getElementById('btn-si');
            const btnNo = document.getElementById('btn-no');

            if (fasePreguntas === 1) {
                pregunta.innerHTML = "¡Bien! ¿El martes te parece bien?";
                
                // El "No" se vuelve un botón normal y plano para el Martes
                btnNo.removeAttribute('onmouseover'); 
                btnNo.style.position = 'relative';
                btnNo.style.left = '0px';
                btnNo.style.top = '0px';

                btnNo.setAttribute('onclick', 'presionoNoMartes()');
                fasePreguntas = 2; 
            } 
            else if (fasePreguntas === 2) {
                pregunta.innerHTML = "¡Excelente! ¿Quieres ir a la plaza?";
                
                btnSi.setAttribute('onclick', 'fasePlaza("si")');
                btnNo.setAttribute('onclick', 'fasePlaza("no")');
            }
        }

        function presionoNoMartes() {
            document.getElementById('pregunta').innerHTML = "¡Va! Entonces dime por WhatsApp qué día te queda mejor dkasjkdajs";
            ocultarBotones();
        }

        function fasePlaza(respuesta) {
            const pregunta = document.getElementById('pregunta');
            ocultarBotones();
            
            if (respuesta === 'si') {
                pregunta.innerHTML = "¡Perfecto! Hay q seguir poniendonos de acuerdo en whatsapp dkasjkdajs";
            } else {
                pregunta.innerHTML = "¡Hecho! Busquemos otro lugar entonces, nos arreglamos por WhatsApp. 😊";
            }
        }

        // El botón huye ÚNICAMENTE en la pregunta de la cita (Fase de preguntas 1)
        function moverBoton() {
            if (fasePreguntas === 1) {
                const btnNo = document.getElementById('btn-no');
                btnNo.style.position = 'fixed';
                const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 20);
                const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 20);
                btnNo.style.left = x + 'px';
                btnNo.style.top = y + 'px';
            }
        }

        function ocultarBotones() {
            document.getElementById('btn-si').style.display = 'none';
            document.getElementById('btn-no').style.display = 'none';
        }
    </script>
</body>
</html>
