<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres tener una cita conmigo?</title>
    <style>
        /* Configuración del fondo y diseño responsivo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffb6c1; /* Fondo rosa claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .contenedor {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
            position: relative;
        }

        h1 {
            color: #ff1493;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        /* Estilo de los botones */
        .botones {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
        }

        #btn-si {
            background-color: #ff1493;
            color: white;
        }

        #btn-si:hover {
            transform: scale(1.1);
            background-color: #ff69b4;
        }

        /* Solución al amontonamiento: posición relativa al inicio */
        #btn-no {
            background-color: #8b8b8b;
            color: white;
            position: relative; 
        }

        /* Estilo para el selector de días */
        select {
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #ff1493;
            margin-top: 15px;
            outline: none;
            background-color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 id="pregunta">¿Quieres tener una cita conmigo?</h1>
        <div class="botones" id="contenedor-botones">
            <button id="btn-si" onclick="presionoSi()">Sí</button>
            <button id="btn-no" onmouseover="moverBoton()" onclick="moverBoton()">No</button>
        </div>
        <div id="zona-extra"></div>
    </div>

    <script>
        // Esta variable controla en qué nivel de pregunta estamos (1, 2 o 3)
        let fase = 1;

        function presionoSi() {
            const pregunta = document.getElementById('pregunta');
            const btnSi = document.getElementById('btn-si');
            const btnNo = document.getElementById('btn-no');

            if (fase === 1) {
                // Pasamos a la pregunta del martes
                pregunta.innerHTML = "¡Bien! ¿El martes te parece bien?";
                
                // IMPORTANTE: Ahora el "No" ya se puede clickear normalmente, no se va a mover
                btnNo.removeAttribute('onmouseover'); 
                btnNo.style.position = 'relative';
                btnNo.style.left = '0px';
                btnNo.style.top = '0px';

                fase = 2; // Avanzamos de fase
            } 
            else if (fase === 2) {
                // Si dice que SÍ al martes, pregunta por la plaza
                pregunta.innerHTML = "¡Excelente! ¿Quieres ir a la plaza?";
                
                // Dejamos los botones normales para que responda a la plaza
                btnSi.style.display = 'inline-block';
                btnNo.style.display = 'inline-block';
                
                // Cambiamos lo que hacen los botones en la fase de la plaza
                btnSi.setAttribute('onclick', 'fasePlaza("si")');
                btnNo.setAttribute('onclick', 'fasePlaza("no")');
            }
        }

        // Función exclusiva para cuando responde la pregunta de la plaza
        function fasePlaza(respuesta) {
            const pregunta = document.getElementById('pregunta');
            ocultarBotones();
            
            if (respuesta === 'si') {
                pregunta.innerHTML = "¡Perfecto! Nos vemos el martes en la plaza. ¡Va a ser genial! 📅✨";
            } else {
                pregunta.innerHTML = "¡Hecho! Busquemos otro lugar entonces, el martes nos vemos de todos modos. 😊";
            }
        }

        // Función que salta si te dice que NO al martes
        function moverBoton() {
            const btnNo = document.getElementById('btn-no');

            if (fase === 1) {
                // En la primera pregunta, el botón huye como antes
                btnNo.style.position = 'fixed';
                const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 20);
                const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 20);
                btnNo.style.left = x + 'px';
                btnNo.style.top = y + 'px';
            } 
            else if (fase === 2) {
                // Si está en la pregunta del martes y presiona NO, muestra la lista de días
                const pregunta = document.getElementById('pregunta');
                pregunta.innerHTML = "Dime qué día de la semana puedes:";
                ocultarBotones();

                // Creamos la lista desplegable dinámicamente con JavaScript
                const zonaExtra = document.getElementById('zona-extra');
                zonaExtra.innerHTML = `
                    <select id="select-dias" onchange="diaSeleccionado()">
                        <option value="">-- Selecciona un día --</option>
                        <option value="Lunes">Lunes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                    </select>
                `;
            }
        }

        // Función para cuando elige un día de la lista
        function diaSeleccionado() {
            const elDia = document.getElementById('select-dias').value;
            if (elDia !== "") {
                document.getElementById('pregunta').innerHTML = `¡Trato hecho! Nos vemos el ${elDia}. 🥰`;
                document.getElementById('zona-extra').innerHTML = ""; // Limpia el menú desplegable
            }
        }

        function ocultarBotones() {
            document.getElementById('btn-si').style.display = 'none';
            document.getElementById('btn-no').style.display = 'none';
        }
    </script>
</body>
</html>
