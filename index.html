<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres tener una cita conmigo?</title>
    <style>
        /* Configuración del fondo y diseño responsivo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffb6c1; /* Fondo rosa claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .contenedor {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
            position: relative;
        }

        h1 {
            color: #ff1493;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        /* Estilo de los botones */
        .botones {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
        }

        #btn-si {
            background-color: #ff1493;
            color: white;
        }

        #btn-si:hover {
            transform: scale(1.1);
            background-color: #ff69b4;
        }

        /* Solución al amontonamiento: posición relativa al inicio */
        #btn-no {
            background-color: #8b8b8b;
            color: white;
            position: relative; 
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 id="pregunta">¿Quieres tener una cita conmigo?</h1>
        <div class="botones" id="contenedor-botones">
            <button id="btn-si" onclick="presionoSi()">Sí</button>
            <button id="btn-no" onmouseover="moverBoton()" onclick="moverBoton()">No</button>
        </div>
    </div>

    <script>
        // Controla en qué pregunta estamos
        let fase = 1;

        function presionoSi() {
            const pregunta = document.getElementById('pregunta');
            const btnSi = document.getElementById('btn-si');
            const btnNo = document.getElementById('btn-no');

            if (fase === 1) {
                // Pasamos a la pregunta del martes
                pregunta.innerHTML = "¡Bien! ¿El martes te parece bien?";
                
                // Desactivamos el escape del botón "No" para esta fase
                btnNo.removeAttribute('onmouseover'); 
                btnNo.style.position = 'relative';
                btnNo.style.left = '0px';
                btnNo.style.top = '0px';

                // Ahora al darle clic a "No", llamará a otra respuesta directa
                btnNo.setAttribute('onclick', 'presionoNoMartes()');

                fase = 2; 
            } 
            else if (fase === 2) {
                // Si dice que SÍ al martes, pregunta por la plaza
                pregunta.innerHTML = "¡Excelente! ¿Quieres ir a la plaza?";
                
                // Cambiamos lo que hacen los botones en la fase de la plaza
                btnSi.setAttribute('onclick', 'fasePlaza("si")');
                btnNo.setAttribute('onclick', 'fasePlaza("no")');
            }
        }

        // Si responde que NO al martes
        function presionoNoMartes() {
            document.getElementById('pregunta').innerHTML = "Okiii ,Entonces dime por WhatsApp qué día te queda mejor dkasjkdajs";
            ocultarBotones();
        }

        // Función para la última respuesta de la plaza
        function fasePlaza(respuesta) {
            const pregunta = document.getElementById('pregunta');
            ocultarBotones();
            
            if (respuesta === 'si') {
                pregunta.innerHTML = "¡Perfecto! Hay q seguir poniendonos de acuerdo en whatsapp dkasjkdajs";
            } else {
                pregunta.innerHTML = "¡Hecho! Busquemos otro lugar entonces, nos arreglamos por WhatsApp. ";
            }
        }

        // El botón huye solo en la primera fase
        function moverBoton() {
            if (fase === 1) {
                const btnNo = document.getElementById('btn-no');
                btnNo.style.position = 'fixed';
                const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 20);
                const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 20);
                btnNo.style.left = x + 'px';
                btnNo.style.top = y + 'px';
            }
        }

        function ocultarBotones() {
            document.getElementById('btn-si').style.display = 'none';
            document.getElementById('btn-no').style.display = 'none';
        }
    </script>
</body>
</html>
